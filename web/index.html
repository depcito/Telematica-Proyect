<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Monitoring — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #16213e; border-radius: 12px; padding: 40px;
            width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { color: #e94560; font-size: 22px; margin-bottom: 8px; }
    p  { color: #a0a0b0; font-size: 13px; margin-bottom: 28px; }
    label { display: block; color: #c0c0d0; font-size: 13px; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid #0f3460; background: #0f3460; color: #fff;
            font-size: 14px; margin-bottom: 18px; outline: none; }
    input:focus { border-color: #e94560; }
    button { width: 100%; padding: 12px; background: #e94560; color: #fff;
             border: none; border-radius: 8px; font-size: 15px;
             cursor: pointer; font-weight: bold; }
    button:hover { background: #c73652; }
    .status-link { display: block; text-align: center; margin-top: 18px;
                   color: #a0a0b0; font-size: 12px; text-decoration: none; }
    .status-link:hover { color: #e94560; }
  </style>
</head>
<body>
  <div class="card">
    <h1>IoT Monitoring</h1>
    <p>Sistema Distribuido de Monitoreo de Sensores</p>
    <form id="loginForm">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="jperez" required>
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <button type="submit">Ingresar</button>
    </form>
    <a class="status-link" href="/dashboard">Ver estado del sistema</a>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      try {
        const res = await fetch('http://' + location.hostname + ':5001/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username: user, password: pass})
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('iot_token', data.token);
          localStorage.setItem('iot_user', data.username);
          alert('Login exitoso. Token guardado.\nToken: ' + data.token.substring(0,16) + '...');
          window.location.href = '/dashboard';
        } else {
          alert('Credenciales incorrectas.');
        }
      } catch(err) {
        alert('Error conectando al servicio de auth.');
      }
    });
  </script>
</body>
</html>
